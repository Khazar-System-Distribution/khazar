name: KhazarOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get install -y gcc make
      - name: Build SDK
        run: make sdk
      - name: Test SDK
        run: make -C sdk test
      - name: Build components
        run: make components
      - name: Build agents
        run: make agents
