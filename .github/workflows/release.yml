name: Build KhazarOS Live ISO

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-iso:
    name: Build ISO
    runs-on: ubuntu-24.04
    container:
      image: quay.io/fedora/fedora:40
      options: --privileged --device /dev/loop-control --device /dev/mapper/control

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf install -y --setopt=install_weak_deps=False \
            livecd-tools lorax anaconda pykickstart \
            gcc make git

      - name: Build Khazar binaries
        run: |
          make sdk
          make -C sdk test || true
          make all

      - name: Prepare overlay files
        run: |
          mkdir -p /tmp/khazar-bin /tmp/khazar-config /tmp/khazar-systemd
          for comp in orchestrator rule-engine policy-engine model-runtime intent-classifier; do
            [ -f "components/$comp/ai-$comp" ] && cp "components/$comp/ai-$comp" /tmp/khazar-bin/
          done
          for agent in desktop package network power audio; do
            [ -f "agents/${agent}-agent/ai-${agent}-agent" ] && cp "agents/${agent}-agent/ai-${agent}-agent" /tmp/khazar-bin/
          done
          [ -f distro/cli/kha ] && cp distro/cli/kha /tmp/khazar-bin/
          cp distro/configs/*.toml /tmp/khazar-config/ 2>/dev/null || true
          cp distro/systemd/*.service distro/systemd/khazar.target /tmp/khazar-systemd/ 2>/dev/null || true
          echo "Binaries:"
          ls /tmp/khazar-bin/ 2>/dev/null || echo "(none)"

      - name: Build Live ISO
        run: |
          livecd-creator \
            --config=os-build/khazaros.ks \
            --fslabel=KhazarOS \
            --title="KhazarOS 0.1.0" \
            --product=KhazarOS \
            --releasever=40 \
            --tmpdir=/tmp/livecd-tmp \
            --cache=/tmp/livecd-cache \
            --verbose 2>&1 | tail -40

      - name: Find and package ISO
        run: |
          ISO=$(find / -name "*.iso" -type f 2>/dev/null | grep -v proc | head -1)
          if [ -z "$ISO" ]; then
            ISO=$(find /tmp -name "*.iso" -type f 2>/dev/null | head -1)
          fi
          if [ -z "$ISO" ]; then
            echo "Contents of /tmp:"
            find /tmp -maxdepth 2 -type f 2>/dev/null | head -30
            echo "ERROR: No ISO produced"
            exit 1
          fi
          cp "$ISO" khazaros-live-x86_64.iso
          ls -lah khazaros-live-x86_64.iso
          sha256sum khazaros-live-x86_64.iso > khazaros-live-x86_64.iso.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: KhazarOS ${{ github.ref_name }}
          files: |
            khazaros-live-x86_64.iso
            khazaros-live-x86_64.iso.sha256
          body: |
            ## KhazarOS ${{ github.ref_name }}

            Bootable Fedora 40 Live ISO with Khazar AI pre-installed.

            ### Download
            - `khazaros-live-x86_64.iso` — Bootable Live ISO (~2 GB)

            ### Usage
            ```bash
            # USB
            sudo dd if=khazaros-live-x86_64.iso of=/dev/sdX bs=4M status=progress

            # QEMU
            qemu-system-x86_64 -m 4096 -enable-kvm -cdrom khazaros-live-x86_64.iso
            ```

            ### After boot
            ```bash
            kha "open firefox"
            kha status
            ```
          draft: false
          prerelease: true
