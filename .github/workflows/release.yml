name: Build KhazarOS ISO

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-distro:
    name: Build KhazarOS
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Build Khazar platform
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq gcc make
          make sdk
          make -C sdk test
          make all

      - name: Copy binaries to system overlay
        run: |
          mkdir -p system/usr/local/bin system/usr/lib
          for comp in orchestrator rule-engine policy-engine model-runtime intent-classifier; do
            [ -f "components/$comp/ai-$comp" ] && cp "components/$comp/ai-$comp" system/usr/local/bin/
          done
          for agent in desktop package network power audio; do
            [ -f "agents/${agent}-agent/ai-${agent}-agent" ] && cp "agents/${agent}-agent/ai-${agent}-agent" system/usr/local/bin/
          done
          [ -f sdk/libai-sdk.a ] && cp sdk/libai-sdk.a system/usr/lib/

      - name: Build container image
        run: |
          docker build --tag khazaros:latest -f Containerfile .

      - name: Save container as tar
        run: |
          docker save khazaros:latest | gzip > khazaros-latest-x86_64.tar.gz
          ls -lah khazaros-latest-x86_64.tar.gz
          sha256sum khazaros-latest-x86_64.tar.gz > khazaros-latest-x86_64.tar.gz.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: KhazarOS ${{ github.ref_name }}
          files: |
            khazaros-latest-x86_64.tar.gz
            khazaros-latest-x86_64.tar.gz.sha256
          body: |
            ## KhazarOS ${{ github.ref_name }}

            Fedora Silverblue-based distro with built-in Khazar AI platform.

            ### Download
            - `khazaros-latest-x86_64.tar.gz` — Full container image (3+ GB)

            ### Convert to bootable disk image
            ```bash
            # Load the container
            docker load -i khazaros-latest-x86_64.tar.gz

            # Convert to ISO (requires bootc-image-builder)
            pip install bootc-image-builder
            sudo bootc-image-builder --type anaconda-iso \
              docker-daemon:khazaros:latest \
              khazaros.iso

            # Write to USB
            sudo dd if=khazaros.iso of=/dev/sdX bs=4M status=progress
            ```

            ### Or build from source on Fedora 40+
            ```bash
            git clone https://github.com/Khazar-System-Distribution/khazar-distro
            cd khazar-distro && bash build-iso.sh
            ```

            See [README.md](README.md) and [TESTING.md](TESTING.md).
          draft: false
          prerelease: true
