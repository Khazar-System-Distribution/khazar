name: Build KhazarOS ISO

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-distro:
    name: Build KhazarOS
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache 2>/dev/null || true
          df -h /

      - name: Build Khazar platform
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq gcc make
          make sdk 2>&1 | tail -3
          make -C sdk test 2>&1 | tail -5
          make all

      - name: Copy binaries to system overlay
        run: |
          mkdir -p system/usr/local/bin system/usr/lib
          for comp in orchestrator rule-engine policy-engine model-runtime intent-classifier; do
            [ -f "components/$comp/ai-$comp" ] && cp "components/$comp/ai-$comp" system/usr/local/bin/
          done
          for agent in desktop package network power audio; do
            [ -f "agents/${agent}-agent/ai-${agent}-agent" ] && cp "agents/${agent}-agent/ai-${agent}-agent" system/usr/local/bin/
          done
          [ -f sdk/libai-sdk.a ] && cp sdk/libai-sdk.a system/usr/lib/
          [ -f distro/cli/kha ] && cp distro/cli/kha system/usr/local/bin/
          chmod +x system/usr/local/bin/* 2>/dev/null || true
          echo "Binaries staged:"
          ls system/usr/local/bin/

      - name: Install podman
        run: |
          sudo apt-get install -y podman

      - name: Build container image
        run: |
          podman build --tag khazaros:latest -f Containerfile .

      - name: Install bootc-image-builder
        run: pip install --user bootc-image-builder

      - name: Build ISO
        run: |
          sudo env "PATH=$PATH:$HOME/.local/bin" \
            bootc-image-builder \
            --type anaconda-iso \
            --rootfs xfs \
            localhost/khazaros:latest \
            khazaros-latest-x86_64.iso

      - name: Verify ISO
        run: |
          ls -lah khazaros-latest-x86_64.iso
          sha256sum khazaros-latest-x86_64.iso > khazaros-latest-x86_64.iso.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: KhazarOS ${{ github.ref_name }}
          files: |
            khazaros-latest-x86_64.iso
            khazaros-latest-x86_64.iso.sha256
          body: |
            ## KhazarOS ${{ github.ref_name }}

            Fedora Silverblue-based distro with built-in AI platform.

            ### Download
            - `khazaros-latest-x86_64.iso` — Bootable installer ISO (3+ GB)

            ### Install
            ```bash
            # USB
            sudo dd if=khazaros-latest-x86_64.iso of=/dev/sdX bs=4M status=progress

            # QEMU
            qemu-system-x86_64 -m 4096 -enable-kvm -hda khazaros-latest-x86_64.iso
            ```

            ### After Boot
            ```bash
            kha "open firefox"
            kha status
            ```
          draft: false
          prerelease: true
